name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # DECISION: lowercase github.repository_owner in a dedicated step and
      # reuse the same output everywhere (image tags + webhook payload) —
      # per vps/MANAGED_PROJECT_GUIDE.md pitfall #1: GHCR silently rejects
      # non-lowercase image names, and Actions expressions don't support a
      # `| lower` filter (that's Liquid syntax, not GH Actions). Alternatives
      # considered: hardcode a lowercased org name (rejected — brittle if the
      # repo is ever transferred; also pitfall #4 warns against hardcoding
      # the same value in more than one place). Reversal cost: low.
      - id: meta
        run: |
          echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/todo:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/todo:latest

      # DECISION: strip whitespace from WEBHOOK_URL and assign $(date +%s) to
      # a variable before use in jq — per guide pitfalls #2 and #3
      # respectively (copy-pasted secrets can carry trailing newlines/spaces
      # causing a misleading "Could not resolve host" error; inline command
      # substitution inside jq args word-splits unpredictably in Actions'
      # shell). Image name is derived once in the `meta` step's owner output
      # and reused verbatim in both `tags:` above and `$BODY` below — per
      # pitfall #4, the webhook payload's image field must exactly match the
      # pushed tag or the dashboard rejects the deploy.
      - name: Notify VPS dashboard
        run: |
          URL=$(printf '%s' "${{ secrets.WEBHOOK_URL }}" | tr -d '[:space:]')
          TS=$(date +%s)
          BODY=$(jq -nc \
            --arg image "ghcr.io/${{ steps.meta.outputs.owner }}/todo:${{ steps.meta.outputs.sha }}" \
            --arg sha "${{ steps.meta.outputs.sha }}" \
            --argjson ts "$TS" \
            '{ image: $image, sha: $sha, ts: $ts }')
          SIG="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')"
          curl -sf -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $SIG" \
            -d "$BODY"
